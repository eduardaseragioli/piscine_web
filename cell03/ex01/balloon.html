<!DOCTYPE html>

<html>
    <head>
        <title>Piscine Web</title>
        <style>
            body{
                height: 100vh;
                display:flex;
                margin: 0;
                justify-content: center;   
                align-items: center;
                background-color: beige;
            }

            #balloon{
                width: 200px;
                height: 200px;
                background-color: red;
                border-radius: 50%;
                cursor: pointer;
                transition: 0.3s ease-in-out;
            }
        </style>
    </head>

    <body>
        <div id="balloon"></div>
        <script>
            const balloon = document.getElementById("balloon");

            let size = 200; /*tamanho iniciao do balao*/
            let colors = ["red", "green", "blue"];
            let colorIndex = 0;

            balloon.addEventListener("click", function(){
                size += 10;

                if (size > 420){
                    size = 200;
                    colorIndex = 0;
                }
                else{
                    colorIndex = (colorIndex + 1) % colors.length; // vai para a proxima cor e nn ultrapassa o limite 
                    /* 0 (red) (0 + 1) % 3 = 1 % 3 = 1 move to gree; */
                    
                }
                balloon.style.width = size + "px"; /* updates ballon size*/
                balloon.style.height = size + "px";
                balloon.style.backgroundColor  = colors[colorIndex]; /*change ballon color*/
            });

            //Mouse leaves: shrink + previous color 
            balloon.addEventListener("mouseleave", function(){
                size -= 5;

                if (size < 200){
                    size = 200;
                }
                else{
                    colorIndex = (colorIndex - 1 + colors.length) % colors.length;
                    /* 2 (blue) (2 - 1 + 3) % 3 = 4 % 3 = 1 resets to green */
                    /* 1 (green) (1 - 1 + 3) % 3 = 3 % 3 = 0 volta red; */
                    /* 0 (red) (0 - 1 + 3) % 3 = 2 % 3 = 2 volta blue; */
                }
                balloon.style.width = size + "px"; /* updates ballon size*/
                balloon.style.height = size + "px";
                balloon.style.backgroundColor  = colors[colorIndex]; /*change ballon color*/
            })
        </script>
    </body>
</html>
